spring.application.name=asiou-conference-portal
server.port=8082

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Example local postgres (adjust)
# spring.datasource.url=jdbc:postgresql://localhost:5432/asiou
# spring.datasource.username=postgres
# spring.datasource.password=postgres

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# JWT (Required in production)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=3600000

# Admin Bootstrap (Required in production if enabled)
app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL}
app.bootstrap.admin.password=${ADMIN_PASSWORD}
app.bootstrap.admin.firstName=${BOOTSTRAP_ADMIN_FIRST_NAME}
app.bootstrap.admin.lastName=${BOOTSTRAP_ADMIN_LAST_NAME}

logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.az.edu.asiouconferenceportal=DEBUG

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB