spring.application.name=asiou-conference-portal
server.port=8083

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Example local postgres (adjust)
# spring.datasource.url=jdbc:postgresql://localhost:5432/asiou
# spring.datasource.username=postgres
# spring.datasource.password=postgres

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=3600000

# Admin Bootstrap (Required env vars if enabled)
# To enable, set app.bootstrap.admin.enabled=true and provide the BOOTSTRAP_ADMIN_* variables
app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@asoiu.az
app.bootstrap.admin.password=AdminPassword123!
app.bootstrap.admin.firstName=System
app.bootstrap.admin.lastName=Admin

logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.az.edu.asiouconferenceportal=DEBUG

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB